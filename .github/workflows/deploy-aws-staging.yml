name: Deploy AWS Staging

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "backend/**"
      - "Dockerfile"
      - "backend/Dockerfile"
      - ".github/workflows/deploy-aws-staging.yml"

env:
  AWS_REGION: ap-southeast-1
  PROJECT_NAME: company-web
  ENVIRONMENT: staging

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: github.repository == 'anhthqb97/Anhloom'
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Check AWS secrets
        id: aws
        run: |
          if [ -z "${{ secrets.AWS_DEPLOY_ROLE_ARN }}" ]; then
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::notice::AWS_DEPLOY_ROLE_ARN not configured — skipping AWS staging deploy"
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        if: steps.aws.outputs.configured == 'true'
        uses: actions/checkout@v5

      - name: Configure AWS credentials
        if: steps.aws.outputs.configured == 'true'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        if: steps.aws.outputs.configured == 'true'
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image tags
        if: steps.aws.outputs.configured == 'true'
        id: images
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          REGISTRY="${ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com"
          SHA_TAG="${GITHUB_SHA::7}"
          echo "frontend_image=${REGISTRY}/${PROJECT_NAME}-frontend:${SHA_TAG}" >> "$GITHUB_OUTPUT"
          echo "backend_image=${REGISTRY}/${PROJECT_NAME}-backend:${SHA_TAG}" >> "$GITHUB_OUTPUT"
          echo "frontend_latest=${REGISTRY}/${PROJECT_NAME}-frontend:latest" >> "$GITHUB_OUTPUT"
          echo "backend_latest=${REGISTRY}/${PROJECT_NAME}-backend:latest" >> "$GITHUB_OUTPUT"

      - name: Build and push frontend image
        if: steps.aws.outputs.configured == 'true'
        run: |
          docker build -t "${{ steps.images.outputs.frontend_image }}" -t "${{ steps.images.outputs.frontend_latest }}" .
          docker push "${{ steps.images.outputs.frontend_image }}"
          docker push "${{ steps.images.outputs.frontend_latest }}"

      - name: Build and push backend image
        if: steps.aws.outputs.configured == 'true'
        run: |
          docker build -t "${{ steps.images.outputs.backend_image }}" -t "${{ steps.images.outputs.backend_latest }}" ./backend
          docker push "${{ steps.images.outputs.backend_image }}"
          docker push "${{ steps.images.outputs.backend_latest }}"

      - name: Register new backend task definition
        if: steps.aws.outputs.configured == 'true'
        id: backend_task
        run: |
          FAMILY="${PROJECT_NAME}-${ENVIRONMENT}-backend"
          CURRENT=$(aws ecs describe-task-definition --task-definition "$FAMILY" --query taskDefinition)
          NEW_TASK=$(echo "$CURRENT" | jq --arg IMAGE "${{ steps.images.outputs.backend_image }}" \
            '.containerDefinitions[0].image = $IMAGE | del(.taskDefinitionArn, .revision, .status, .requiresAttributes, .compatibilities, .registeredAt, .registeredBy)')
          ARN=$(aws ecs register-task-definition --cli-input-json "$NEW_TASK" --query 'taskDefinition.taskDefinitionArn' --output text)
          echo "task_definition_arn=$ARN" >> "$GITHUB_OUTPUT"

      - name: Register new frontend task definition
        if: steps.aws.outputs.configured == 'true'
        id: frontend_task
        run: |
          FAMILY="${PROJECT_NAME}-${ENVIRONMENT}-frontend"
          CURRENT=$(aws ecs describe-task-definition --task-definition "$FAMILY" --query taskDefinition)
          NEW_TASK=$(echo "$CURRENT" | jq --arg IMAGE "${{ steps.images.outputs.frontend_image }}" \
            '.containerDefinitions[0].image = $IMAGE | del(.taskDefinitionArn, .revision, .status, .requiresAttributes, .compatibilities, .registeredAt, .registeredBy)')
          ARN=$(aws ecs register-task-definition --cli-input-json "$NEW_TASK" --query 'taskDefinition.taskDefinitionArn' --output text)
          echo "task_definition_arn=$ARN" >> "$GITHUB_OUTPUT"

      - name: Update ECS services
        if: steps.aws.outputs.configured == 'true'
        run: |
          CLUSTER="${PROJECT_NAME}-${ENVIRONMENT}"
          aws ecs update-service --cluster "$CLUSTER" --service "${PROJECT_NAME}-${ENVIRONMENT}-backend" \
            --task-definition "${{ steps.backend_task.outputs.task_definition_arn }}" --desired-count 1
          aws ecs update-service --cluster "$CLUSTER" --service "${PROJECT_NAME}-${ENVIRONMENT}-frontend" \
            --task-definition "${{ steps.frontend_task.outputs.task_definition_arn }}" --desired-count 1
          aws ecs wait services-stable --cluster "$CLUSTER" --services \
            "${PROJECT_NAME}-${ENVIRONMENT}-frontend" \
            "${PROJECT_NAME}-${ENVIRONMENT}-backend"
