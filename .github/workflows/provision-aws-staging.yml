name: Provision AWS Staging

on:
  workflow_dispatch:

env:
  AWS_REGION: ap-southeast-1

jobs:
  provision:
    runs-on: ubuntu-latest
    if: github.repository == 'anhthqb97/Anhloom'
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Check AWS secrets
        id: aws
        run: |
          if [ -z "${{ secrets.AWS_PROVISION_ROLE_ARN }}" ]; then
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::notice::AWS_PROVISION_ROLE_ARN not configured — skipping"
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        if: steps.aws.outputs.configured == 'true'
        uses: actions/checkout@v5

      - name: Configure AWS credentials
        if: steps.aws.outputs.configured == 'true'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_PROVISION_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        if: steps.aws.outputs.configured == 'true'
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.8

      - name: Terraform apply
        if: steps.aws.outputs.configured == 'true'
        working-directory: infra/environments/staging
        env:
          TF_VAR_internal_api_key: ${{ secrets.INTERNAL_API_KEY }}
          TF_VAR_openai_api_key: ${{ secrets.OPENAI_API_KEY }}
          TF_VAR_anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          TF_VAR_sanity_read_token: ${{ secrets.SANITY_API_READ_TOKEN }}
          TF_VAR_sanity_project_id: ${{ secrets.NEXT_PUBLIC_SANITY_PROJECT_ID }}
          TF_VAR_site_url: ${{ secrets.STAGING_SITE_URL }}
        run: |
          terraform init -input=false
          terraform apply -auto-approve -input=false \
            -var="github_org=${{ github.repository_owner }}" \
            -var="github_repo=${{ github.event.repository.name }}" \
            -var="service_desired_count=0"

      - name: Print outputs
        if: steps.aws.outputs.configured == 'true'
        working-directory: infra/environments/staging
        run: |
          echo "ALB DNS:      $(terraform output -raw alb_dns_name)"
          echo "Deploy role:  $(terraform output -raw github_deploy_role_arn)"
          echo "Frontend ECR: $(terraform output -raw frontend_ecr_repository_url)"
          echo "Backend ECR:  $(terraform output -raw backend_ecr_repository_url)"
